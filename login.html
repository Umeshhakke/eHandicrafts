<!DOCTYPE html>
<html>
<head>
    <title>Login - eHandicrafts</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f3f3;
        }

       .container {
        display: flex;
        height: 100vh;
              }

        
        .left {
        flex: 1;
        background-image: url('/images/handicraft.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
             }

        /* RIGHT SIDE LOGIN */
        .right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
        }

        .login-box {
            width: 320px;
            text-align: center;
        }

        .logo {
            font-size: 24px;
            margin-bottom: 10px;
        }

        h2 {
            margin-bottom: 5px;
        }

        p {
            color: gray;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #8B4513;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #5a2d0c;
        }

        .links {
            margin-top: 10px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }

        .links a {
            text-decoration: none;
            color: #8B4513;
        }

        .register {
            margin-top: 20px;
            font-size: 14px;
        }

        .register a {
            text-decoration: none;
            color: #8B4513;
            font-weight: bold;
        }

        /* MOBILE RESPONSIVE */
        @media(max-width: 768px){
            .container {
                flex-direction: column;
            }
            .left {
                height: 200px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Left image -->
    <div class="left"></div>

    <!-- Right login -->
    <div class="right">
        <div class="login-box">

            <!-- LOGO -->
            <div class="logo">🪔 eHandicrafts</div>

            <h2>Welcome Back 👋</h2>
            <p>Login to your account</p>

            <form action="/login" method="POST">
                <input type="email" name="email" placeholder="Email Address" required>
                <input type="password" name="password" placeholder="Password" required>

                <button type="submit">Login</button>
            </form>

            <div class="links">
                <a href="#">Forgot Password?</a>
                <a href="#">Help</a>
            </div>

            <div class="register">
                New user? <a href="#">Create Account</a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
